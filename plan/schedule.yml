# Sprint-plan SOURCE OF TRUTH. Edit THIS file, then run `python src/report_plan.py --open`
# to regenerate PLAN.md / plan/PLAN.html and view it. NEVER hand-edit a rendered file —
# the drift gate (src/test_report_plan.py) fails CI if you do. Format: PLAN_FORMAT.md.
meta:
  plan_name: "NASCAR Cup Model"
  as_of: "2026-07-20"
  spec_version: 1
  shape_sig: "c09998956a055c42"
  standfirst: >-
    The single living plan for a walk-forward Plackett-Luce model of Cup Series
    finishing order. It spans governance (audit, frozen specs, adversarial review),
    a bronze/silver/gold foundation, a gated backlog of feature/likelihood/causal/
    Bayesian experiments, and a co-equal model-book thread — diagnostic Monte-Carlo
    pricing plus a pre-registered calibration backtest — under three invariants: the
    frozen model changes only via a pre-registered walk-forward-gated A/B; the
    perishable market capture never pauses and stays the sovereign, gate-tethered
    external judge; calibration is model-quality, never edge.
  bottom_line: >-
    Bronze/silver/gold complete; D1 re-proved 0.413/0.476/0.447; D2 consumers green.
    Race 5618 SCORED (rho=0.5458) but post-flag/inadmissible, so the market benchmark
    is at N=0, capture_debt=1. L5+L6 DONE -- STAY MANUAL; L2 moot. F20 vetted the
    model-book pivot; owner chose DEMOTE + tether. M1-M4 shipped the pricer,
    calibration backtest, and three tether gates: the benchmark stays **sovereign
    and gate-protected**. C4 added silver caution/stage tables. F19 measured
    incentive-state lore (mixed nulls/reals). F3 shipped gold.track_profiles (ten
    empirical metrics). F4 shipped gold.track_dst/track_pltree (Driver Skill
    Transferability). F13 shipped gold.driver_loop_race/driver_loop_history
    (in-house loop-metric histories -- ARP + five more, self-built composite
    replaces NASCAR's circular Driver Rating). All four analytics-only,
    build-graph isolated. 17/17 gates green. 'next' is F14 (Next Gen
    equipment-share decomposition). M5/F10/F1/F2 gated on >=8 scored non-SS races;
    G2 gated on market EDGE. E1 never pauses.
  handoff_note: >-
    F14 is 'next' as of 2026-07-20 -- Next Gen equipment-share decomposition per
    research/external_knowledge_scan.md section 3.6 (van Kesteren & Bergkamp JQAS
    2023 template). Pre-register a spec, then build a hierarchical driver/team/make
    variance decomposition over gold walk-forward data (2022+), satisfying section
    3.2's standing requirement (strong-connectivity diagnostic + explicit
    regularization) before estimating any variance component. Descriptive/Tier A --
    never touches the frozen model; result is direct trigger evidence for or
    against F11. Model: Sonnet 5, thinking on, effort xhigh. E1 preempts on a race
    weekend.

phases:
  - key: "A"
    num: "I"
    title: "Foundation & pre-registration (governance)"
    model: "Fable 5 · thinking on · xhigh"
    note: >-
      Judgment-shaped work done before any result existed — audit, frozen config
      VALUES, immutable rulebooks, adversarial review. Complete and
      architecture-independent: it survives the rebuild unchanged and is the
      equity the rebuild must preserve, not re-choose.
  - key: "B"
    num: "II"
    title: "Bronze — immutable raw archive"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      The medallion rebuild starts here. Design the architecture first (Fable),
      then pull EVERY available feed for every series back to the real
      detailed-feed floor into an unchanged, hashed local store. Purely
      additive, low-risk, and preserves data that lives only on NASCAR's servers.
  - key: "C"
    num: "III"
    title: "Silver — cleaned & conformed"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Parse, clean, dedupe, conform bronze into DuckDB/parquet tables. The
      driver-race table must reproduce today's parsed fields EXACTLY
      (regression-gated), so the validated model is untouched; new lap/pit/flag
      tables unlock the feeds we've never used. C3 adds vendored track-audit
      reference tables (physical facts + crosswalk + quarantined priors) —
      package-only, no hard dep on C1/C2.
  - key: "D"
    num: "IV"
    title: "Gold — model & analytics surface"
    model: "Sonnet 5 · thinking on · xhigh"
    note: >-
      Model-ready feature tables + scoring + benchmark as consumers, built in
      SQL on silver. The frozen config VALUES carry over; the engine is
      re-pointed to gold and must RE-PROVE 0.413 / 0.476 non-SS before gold
      replaces the old pickle path. Effort xhigh — the numbers must match.
  - key: "E"
    num: "V"
    title: "Forward test (RUNNING — perishable capture)"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Closing-line data exists only in the minutes before each green flag and
      can never be backfilled, so this loop runs every race weekend regardless
      of rebuild progress. Scoring/benchmark themselves are re-homed to Gold;
      what stays here is the capture that must not be starved.
  - key: "F"
    num: "VI"
    title: "Feature experiments (gated: >=8 scored, on gold)"
    model: "Sonnet 5 · thinking on · xhigh"
    note: >-
      The pre-registered feature A/Bs, run against the gold feature layer —
      specs frozen and carried over, each adopted only on its own walk-forward
      gate; nothing enters the frozen model without one. Two families: the
      roadmap-#4 A/Bs (F1 DNF then F2 pooling, serial; gated on >=8 scored
      races) and the track-audit / external-scan follow-ups (F3/F4, F8-F19).
      Analytics and reference sessions (F3/F4/F13/F14/F19) never touch the
      frozen model. The four research spikes are done and folded into the
      session rows: F5 (26dff0c) scoped track-audit derivations (C3, F3/F4,
      F8/F9); F6 (6d5e18e) scanned external work (F12-F16, A6); F7 (b4c00d7)
      assessed Bayesian formulations (F10 recommended, F11 conditional,
      generative model C decided NULL); F16 (c94f7e7) swept domain knowledge
      (C4, F18, F19, 2026 Chase-format break to F9). C's trigger T1 is now
      ARMED by phase M's calibration backtest for non-SS tails only — SS is
      stand-down, not a C-target; C stays gated until owner election.
  - key: "M"
    num: "VII"
    title: "Model book (multi-market pricing + calibration)"
    model: "Opus 4.8 (spec) / Sonnet 5 (build) · thinking on · xhigh"
    note: >-
      The DEMOTE+tether pivot (F20 memo, owner GO 2026-07-20): a diagnostic
      Monte-Carlo pricer over order-derived markets + a pre-registered
      calibration backtest, with the market benchmark mechanically tethered so
      it stays sovereign. Pricing is a PL-faithful readout (coherence = internal
      consistency only, NOT correctness); calibration is model-quality, never
      edge, never a #5 unlock. Decision-grade evidence is the forward stream
      only; the 163-race backtest is an in-sample dev smoke test. Specs frozen
      in M1 (pricing_layer, calibration_backtest, tether_gates); builds are
      Sonnet, gated. Recalibration and the generative simulator (F7-C) stay
      separate/gated. The benchmark never drops; E1 capture never pauses.
  - key: "G"
    num: "VIII"
    title: "Causal clean-air pace (gated: market EDGE)"
    model: "Fable 5 · thinking on · xhigh"
    note: >-
      The hardest feature, attempted only if the market benchmark returns EDGE.
      The design spec can be written now; its raw material (restart reshuffles,
      pit cycles) comes from the new silver pit/flag tables.
  - key: "H"
    num: "IX"
    title: "Capture infra — local-first (AWS deferred indefinitely)"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Capture-side infrastructure protecting the forward test's sample size and
      its irreplaceable data. DECISION 2026-07-19: AWS is deferred INDEFINITELY
      — the local jobs (L1-L4) are the active path; the AWS sessions (H1-H3) are
      frozen as a cloud fallback, unfrozen only if the owner lifts the deferral.
      No GitHub Actions (quota trap). Plan-only — each item needs its own owner
      go; see planning/aws_solutions.md.
  - key: "R"
    num: "R"
    title: "Retired — superseded by the medallion rebuild"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Sessions overtaken by the 2026-07-19 foundation-rebuild decision, kept as
      record. Their intent survives — folded into the Gold consumers — but the
      standalone-script-against-the-old-pipeline approach is retired.

