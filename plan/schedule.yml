# Sprint-plan SOURCE OF TRUTH. Edit THIS file, then run `python src/report_plan.py --open`
# to regenerate PLAN.md / plan/PLAN.html and view it. NEVER hand-edit a rendered file —
# the drift gate (src/test_report_plan.py) fails CI if you do. Format: PLAN_FORMAT.md.
meta:
  plan_name: "NASCAR Cup Model"
  as_of: "2026-07-19"
  spec_version: 1
  standfirst: >-
    The single living plan for the walk-forward Plackett-Luce Cup Series model,
    now on a foundation-first medallion (bronze/silver/gold) rebuild. Governance
    (audit, pre-registered specs, adversarial review) is complete and
    architecture-independent; the data foundation is being rebuilt clean, with
    the perishable weekly market capture running throughout. Rendered from data,
    kept here and nowhere else.
  bottom_line: >-
    The rebuild foundation is laid: B1 (the frozen execution contract, with the
    silver-regression and re-prove gates) and B2 (the full historical bronze
    pull) are both done as of 2026-07-19. Next in the mainline is B3 — bronze
    verification (Sonnet) — which gates the silver work; the perishable weekly
    predict+odds capture never pauses for the rebuild, and it plus everything
    downstream is re-homed as a Gold consumer. Governance and all three research
    spikes are complete and folded into the phase tables below; nothing they
    propose enters the frozen model without a gated A/B.
  handoff_note: >-
    B2 is a Sonnet build session executing the spec's section-10 B2 checklist
    with zero design judgment calls (every choice is pre-resolved in the spec;
    genuine ambiguity means stop and flag, not choose). Doctrine for the whole
    rebuild: preserve the validated results and pre-registered decisions,
    RE-PROVE the model on the new foundation rather than re-choosing it, and
    never pause the perishable weekly odds capture.

phases:
  - key: "A"
    num: "I"
    title: "Foundation & pre-registration (governance)"
    model: "Fable 5 · thinking on · xhigh"
    note: >-
      Judgment-shaped work done before any result existed — audit, frozen config
      VALUES, immutable rulebooks, adversarial review. Complete and
      architecture-independent: it survives the rebuild unchanged and is the
      equity the rebuild must preserve, not re-choose.
  - key: "B"
    num: "II"
    title: "Bronze — immutable raw archive"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      The medallion rebuild starts here. Design the architecture first (Fable),
      then pull EVERY available feed for every series back to the real
      detailed-feed floor into an unchanged, hashed local store. Purely
      additive, low-risk, and preserves data that lives only on NASCAR's servers.
  - key: "C"
    num: "III"
    title: "Silver — cleaned & conformed"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Parse, clean, dedupe, conform bronze into DuckDB/parquet tables. The
      driver-race table must reproduce today's parsed fields EXACTLY
      (regression-gated), so the validated model is untouched; new lap/pit/flag
      tables unlock the feeds we've never used. C3 adds vendored track-audit
      reference tables (physical facts + crosswalk + quarantined priors) —
      package-only, no hard dep on C1/C2.
  - key: "D"
    num: "IV"
    title: "Gold — model & analytics surface"
    model: "Sonnet 5 · thinking on · xhigh"
    note: >-
      Model-ready feature tables + scoring + benchmark as consumers, built in
      SQL on silver. The frozen config VALUES carry over; the engine is
      re-pointed to gold and must RE-PROVE 0.413 / 0.476 non-SS before gold
      replaces the old pickle path. Effort xhigh — the numbers must match.
  - key: "E"
    num: "V"
    title: "Forward test (RUNNING — perishable capture)"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Closing-line data exists only in the minutes before each green flag and
      can never be backfilled, so this loop runs every race weekend regardless
      of rebuild progress. Scoring/benchmark themselves are re-homed to Gold;
      what stays here is the capture that must not be starved.
  - key: "F"
    num: "VI"
    title: "Feature experiments (gated: >=8 scored, on gold)"
    model: "Sonnet 5 · thinking on · xhigh"
    note: >-
      The pre-registered roadmap-#4 A/Bs, now executed against the gold feature
      layer. Specs are frozen and carry over; hard-gated on >=8 scored races,
      and F2 is serial after F1's decision. F3/F4 are follow-ups from the
      vendored track-audit package (research/track_audit/) — analytics and
      reference outputs gated on the medallion build rather than on scored
      races; neither touches the frozen model. The three research spikes are
      all done and folded in: F5 (26dff0c) inventoried everything derivable
      from the vendored track audit and scoped F3/F4 + the C3 dimension table;
      F6 (6d5e18e) scanned the external NASCAR knowledge landscape with
      adversarial verification — its distillates are F12-F15, A6, the F3/F4
      tightenings, and the F16 follow-up; F7 (b4c00d7) assessed Bayesian
      formulations. All propose only — nothing enters the frozen model without
      its own gated A/B. F8/F9 are net-new track-audit feature A/Bs surfaced
      by F5 (config-novelty; era-reset — whose 2026 hp750 break is live in the
      current forward test), gated on C3 + scored races. From F7: B (dynamic
      state-space skill recency) is recommended with a pre-registered A/B
      banked, now F10, gated the same as F1/F2/F8/F9; A (hierarchical Bayesian
      PL) is conditional, banked as a design outline only, now F11, blocked on
      F10 + F2's decisions; C (generative outcome model — finish jointly with
      DNF/attrition + cautions) is DECIDED NULL for now, not re-proposable
      without meeting one of three named triggers: T1 a simulation/DFS surface
      with its own pre-registered scoring rule is adopted into the plan, T2 the
      market benchmark returns EDGE and the project extends to win/futures
      markets where tail calibration is priced, or T3 F1 adopts a DNF variant
      whose per-type splits attribute the gain to attrition ordering. From F6:
      F12 (attrition/reverse-PL likelihood A/B — the strongest
      externally-validated idea, gated after F1/F2/F10), F13 (in-house
      loop-metric histories from silver.laps, on C2), F14 (equipment-share
      decomposition, analytics, F11 trigger evidence, on D1), F15 (nascaR.data
      vendoring, blocked on an owner licensing decision), and F16 — the
      domain-knowledge complement to F6 (crew chiefs, playoff incentives,
      tires, draft alliances; hypothesis generation against in-feed proxies),
      ungated and runnable now. F6 also verified F7's four prior-art anchors
      with exact citations (scan §3.11) and put NASCAR's July-2025 ToS
      question to the owner as A6.
  - key: "G"
    num: "VII"
    title: "Causal clean-air pace (gated: market EDGE)"
    model: "Fable 5 · thinking on · xhigh"
    note: >-
      The hardest feature, attempted only if the market benchmark returns EDGE.
      The design spec can be written now; its raw material (restart reshuffles,
      pit cycles) comes from the new silver pit/flag tables.
  - key: "H"
    num: "VIII"
    title: "Capture infra — local-first (AWS deferred indefinitely)"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Capture-side infrastructure that protects the forward test's sample size
      and preserves irreplaceable data. DECISION 2026-07-19: AWS build-out is
      deferred INDEFINITELY — the local versions (L1-L4) are the active path and
      run first; the AWS sessions (H1-H3) are frozen as the eventual cloud
      fallback and run only if the owner lifts the deferral. All fetching is
      already local (src/update_data.py is a 4-line urllib loop); only the
      live-feed poller is new engineering. No GitHub Actions (quota trap).
      Plan-only; each item needs its own owner go. See planning/aws_solutions.md.
  - key: "R"
    num: "R"
    title: "Retired — superseded by the medallion rebuild"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Sessions overtaken by the 2026-07-19 foundation-rebuild decision, kept as
      record. Their intent survives — folded into the Gold consumers — but the
      standalone-script-against-the-old-pipeline approach is retired.

