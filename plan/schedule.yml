      unifying F2 pooling + F3 track work) — CONDITIONAL, bank don't run: not
      coherent as a static-only model, duplicates F2's question until F1/F2/B
      are decided; Laplace-first (not MCMC) when it does run; design outline
      banked in §8 (-> F11, blocked on trigger). (C) generative outcome model
      (finish jointly with DNF/attrition + cautions) — NULL for now: its
      bimodal-tail payoff lands on win/top-5/sim surfaces no frozen metric
