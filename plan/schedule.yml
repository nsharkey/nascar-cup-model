      Continuing the NASCAR Cup model project (repo at ~/Downloads/nascar-cup-model).
      Read README.md, PLAN.md (Phase F), research/external_knowledge_scan.md (esp. §4.2
      practitioner signals and §10 open questions), research/track_audit_derivation.md,
      and research/track_audit/INTEGRATION.md so nothing duplicates existing plans.

      RESEARCH SPIKE F16 — NASCAR domain-knowledge scan (hypothesis generation).
      Complement F6: not "how does everyone model NASCAR" but "what does the sport
