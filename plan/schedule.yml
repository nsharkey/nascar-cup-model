# Sprint-plan SOURCE OF TRUTH. Edit THIS file, then run `python src/report_plan.py --open`
# to regenerate PLAN.md / plan/PLAN.html and view it. NEVER hand-edit a rendered file —
# the drift gate (src/test_report_plan.py) fails CI if you do. Format: PLAN_FORMAT.md.
meta:
  plan_name: "NASCAR Cup Model"
  as_of: "2026-07-19"
  spec_version: 1
  standfirst: >-
    The single living plan for the walk-forward Plackett-Luce Cup Series model,
    now on a foundation-first medallion (bronze/silver/gold) rebuild. Governance
    (audit, pre-registered specs, adversarial review) is complete and
    architecture-independent; the data foundation is being rebuilt clean, with
    the perishable weekly market capture running throughout. Rendered from data,
    kept here and nowhere else.
  bottom_line: >-
    B1 is done (2026-07-19): specs/medallion_architecture.md is committed
    (4d3a415) — the execution contract for the whole rebuild, with the silver
    regression gate (C) and the 0.413/0.476/0.449 re-prove gate (D) frozen.
    Next is **B2 — bronze ingestion** (Sonnet): the full historical pull of all
    6 feeds x 3 series from the 2015 index floor into an immutable, hashed,
    versioned archive. The perishable weekly predict+odds capture (E1) never
    pauses for the rebuild; scoring and the market benchmark are re-homed as
    Gold consumers. Feature and causal-pace work run on Gold, still gated.
    E2 landed early (2026-07-19): the repo is public at
    nsharkey/nascar-cup-model and prediction #1's seal was pushed ~6 hours
    before the North Wilkesboro green flag.
  handoff_note: >-
    B2 is a Sonnet build session executing the spec's section-10 B2 checklist
    with zero design judgment calls (every choice is pre-resolved in the spec;
    genuine ambiguity means stop and flag, not choose). Doctrine for the whole
    rebuild: preserve the validated results and pre-registered decisions,
    RE-PROVE the model on the new foundation rather than re-choosing it, and
    never pause the perishable weekly odds capture.

phases:
  - key: "A"
    num: "I"
    title: "Foundation & pre-registration (governance)"
    model: "Fable 5 · thinking on · xhigh"
    note: >-
      Judgment-shaped work done before any result existed — audit, frozen config
      VALUES, immutable rulebooks, adversarial review. Complete and
      architecture-independent: it survives the rebuild unchanged and is the
      equity the rebuild must preserve, not re-choose.
  - key: "B"
    num: "II"
    title: "Bronze — immutable raw archive"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      The medallion rebuild starts here. Design the architecture first (Fable),
      then pull EVERY available feed for every series back to the real
      detailed-feed floor into an unchanged, hashed local store. Purely
      additive, low-risk, and preserves data that lives only on NASCAR's servers.
  - key: "C"
    num: "III"
    title: "Silver — cleaned & conformed"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Parse, clean, dedupe, conform bronze into DuckDB/parquet tables. The
      driver-race table must reproduce today's parsed fields EXACTLY
      (regression-gated), so the validated model is untouched; new lap/pit/flag
      tables unlock the feeds we've never used.
  - key: "D"
    num: "IV"
    title: "Gold — model & analytics surface"
    model: "Sonnet 5 · thinking on · xhigh"
    note: >-
      Model-ready feature tables + scoring + benchmark as consumers, built in
      SQL on silver. The frozen config VALUES carry over; the engine is
      re-pointed to gold and must RE-PROVE 0.413 / 0.476 non-SS before gold
      replaces the old pickle path. Effort xhigh — the numbers must match.
  - key: "E"
    num: "V"
    title: "Forward test (RUNNING — perishable capture)"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Closing-line data exists only in the minutes before each green flag and
      can never be backfilled, so this loop runs every race weekend regardless
      of rebuild progress. Scoring/benchmark themselves are re-homed to Gold;
      what stays here is the capture that must not be starved.
  - key: "F"
    num: "VI"
    title: "Feature experiments (gated: >=8 scored, on gold)"
    model: "Sonnet 5 · thinking on · xhigh"
    note: >-
      The pre-registered roadmap-#4 A/Bs, now executed against the gold feature
      layer. Specs are frozen and carry over; hard-gated on >=8 scored races,
      and F2 is serial after F1's decision. F3/F4 are follow-ups from the
      vendored track-audit package (research/track_audit/) — analytics and
      reference outputs gated on the medallion build rather than on scored
      races; neither touches the frozen model.
  - key: "G"
    num: "VII"
    title: "Causal clean-air pace (gated: market EDGE)"
    model: "Fable 5 · thinking on · xhigh"
    note: >-
      The hardest feature, attempted only if the market benchmark returns EDGE.
      The design spec can be written now; its raw material (restart reshuffles,
      pit cycles) comes from the new silver pit/flag tables.
  - key: "H"
    num: "VIII"
    title: "Infra (AWS, optional, per-item go)"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Capture-side infrastructure at a few dollars a month. Odds capture protects
      the perishable data; the live poller + S3 mirror back up the ephemeral
      stream and the bronze archive. Plan-only; each needs its own go.
  - key: "R"
    num: "R"
    title: "Retired — superseded by the medallion rebuild"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Sessions overtaken by the 2026-07-19 foundation-rebuild decision, kept as
      record. Their intent survives — folded into the Gold consumers — but the
      standalone-script-against-the-old-pipeline approach is retired.

