    status: "pending"
    model: "Fable 5 · thinking on · xhigh"
    settings: {thinking: true, effort: "xhigh"}
    wall_clock: "~3-5 hr"
    ref: null
    exec_summary: >-
      The complement to F6: not "how does everyone model NASCAR" but "what
      does the sport itself know that our feature set ignores" — crew chief
      changes, playoff desperation, tire allocations, draft alliances — each
      idea kept only if a measurable, leakage-safe proxy exists in data we
      already hold. F6's strict verification standard structurally filtered
      domain lore out; this spike admits it as hypotheses with explicit
      credibility discounting.
    tech_summary: >-
      Deliverable research/domain_knowledge_scan.md in F6's format (credibility,
      mechanism, proxy fields, leakage + event-frequency power check, governance
      tier, overlap, candidate session). Sweeps: (1) people/org changes — crew
      chief tenure/swaps and ride changes from the weekend feed's
      crew_chief_id/team transitions (new ground vs F2's org-form pooling);
      (2) incentive states — playoff bubble math from points_position /
      playoff_points_earned / playoff_round (the measurable version of the
      "motivation" signal F6 marked unmeasured; sharpens track-audit H5);
      (3) equipment/tires — Goodyear per-race compound/allocation advances
      (verify archival depth), pit_box (partially answers track-audit H7
      in-feed), manufacturer draft-alliance correlation at SS from our lap
      data; (4) rules/format eras — inventory only, defer to F9; (5) race-craft
      meta — inventory and defer to F3/G1 owners, add nothing. Includes the
      in-feed inventory of ~30 unconsumed weekend-feed result-row/race-level
      fields (verified present in bronze 2026-07-19: crew_chief_fullname/id,
      owner_id, sponsor, pit_box, points_position, points_delta,
      playoff_points_earned, playoff_round, infractions, inspection_complete,
      pit_reports, race_purse). Proposes only; expected payoff MED for model
      features (low-frequency events rarely clear +0.005), HIGH for
      analytics/DFS and for replacing pundit lore with measured answers.
    deps: []
    status_note: >-
      Proposed 2026-07-19 in the F6 close-out discussion (owner-accepted).
      Ungated, runnable now, independent of the rebuild; sources admitted as
      hypothesis generators with credibility discounting — the A/B gate, not
      source verification, is where rigor lands.
