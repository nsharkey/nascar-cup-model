    phase: "F"
    title: "Rank-likelihood A/B — attrition (reverse-PL) ± time-weighting"
    status: "blocked"
    model: "Fable 5 (spec) / Sonnet 5 (run) · thinking on · xhigh"
    settings: {thinking: true, effort: "xhigh"}
    wall_clock: "~1-2 hr spec + ~3-6 hr run"
    ref: null
    exec_summary: >-
      Test whether flipping the model's likelihood — scoring races from last
      place upward, the way attrition actually works — beats the current
      model. The strongest externally-validated idea from the F6 scan:
      proposed for NASCAR in 2003, and it clearly beat standard Plackett-Luce
      in a walk-forward F1 forecasting study.
    tech_summary: >-
      Pre-register a spec per research/external_knowledge_scan.md §3.3-§3.5
      (Graves-Reese-Fitzgerald 2003 JASA -> Henderson & Kirrane 2018 Bayesian
      Analysis citation chain, scan §3.11 anchor 4). Variants: attrition
      (reverse-PL over the same feature utilities — reversed sequential
      likelihood in a step-script copy of pl_fit); attrition + likelihood-level
      geometric time-weighting (conditional on F10's outcome per scan §3.4 —
      drop on an F10 adopt unless a distinct mechanism argument is recorded
      pre-data); truncated-PL considered-and-rejected in-spec with citation
      (loses to attrition; misaligned with the frozen full-order-rho primary).
      Baseline = then-frozen config, reproduced exactly (baseline-replication
      asserts per the DNF-spec amendment pattern). Adopt iff one-sided Wilcoxon
      p <= alpha_adj (multiplicity extending the roadmap-#4 family convention)
      AND mean(d) >= +0.005. Honest tension recorded pre-data: the external
      wins are top-of-order probabilities; our primary is full-order rho — a
      null on rho with improved top-order calibration is a plausible,
      reportable outcome.
    deps: ["D1", "F2", "F10"]
    status_note: >-
      Proposed by F6 (6d5e18e, scan §8.1/§9.1). Gated: >=8 scored races AND
      gold (D1) AND F1->F2->F10 decisions recorded (baseline known; the
      time-weighting variant's fate depends on F10). Likelihood lever —
      disjoint from the DNF/pooling feature levers and from F10's
      feature-history gain lever.
