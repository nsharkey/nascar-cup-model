# Sprint-plan SOURCE OF TRUTH. Edit THIS file, then run `python src/report_plan.py`
# to regenerate PLAN.md and plan/PLAN.html. NEVER hand-edit a rendered file — the
# drift gate (src/test_report_plan.py) fails CI if you do. Format: PLAN_FORMAT.md.
meta:
  plan_name: "NASCAR Cup Model"
  as_of: "2026-07-19"
  spec_version: 1
  standfirst: >-
    The single living plan for the walk-forward Plackett-Luce Cup Series model:
    a completed foundation (audit, frozen config, pre-registered and
    adversarially reviewed specs) now feeding the weekly forward test, with the
    feature and causal-pace tracks gated behind it. Rendered from data, kept
    here and nowhere else.
  bottom_line: >-
    Foundation and pre-registration are complete and adversarially reviewed
    (26 findings, all fixed pre-data). The project is now in weekly accrual
    (Phase B), whose only near-term build is **B0 — build `score_race.py` and
    score prediction #1**. Phases C and D stay behind their gates; the two
    items you can independently pull forward are the Fable-written roadmap-#5
    design spec (D0) and AWS closing-odds capture (E1).
  handoff_note: >-
    B0 is a Sonnet 5 build against a zero-judgment spec — run it fresh on
    Sonnet 5, thinking on, effort high (this Fable session exceeds that tier).
    It is gated only on the North Wilkesboro race actually running; the
    prediction refuses to be scored before results exist.

phases:
  - key: "A"
    num: "I"
    title: "Foundation & pre-registration"
    model: "Fable 5 · thinking on"
    note: >-
      Judgment-shaped work: audit, frozen config, and immutable rulebooks
      written before any result exists. Complete. Model attribution on these
      rows reflects the judgment tier; detail lives in the technical column.
  - key: "B"
    num: "II"
    title: "Market-benchmark accrual (RUNNING)"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      The running spine: the weekly predict-then-score loop that accumulates
      scored races and closing prices to answer the project's central question
      (is there a live edge over the closing line?). Gates Phases C and D.
  - key: "C"
    num: "III"
    title: "Feature experiments (gated: >=8 scored races)"
    model: "Sonnet 5 · thinking on · xhigh"
    note: >-
      Walk-forward A/B tests that adopt a feature only if it beats the frozen
      config by a pre-registered margin. Hard-gated on >=8 scored forward
      races; C2 is serial after C1's decision.
  - key: "D"
    num: "IV"
    title: "Causal clean-air pace (gated: market EDGE)"
    model: "Fable 5 · thinking on"
    note: >-
      The hardest feature, attempted only if the market benchmark returns
      EDGE. The design spec can be written now; execution stays gated. The
      fixed-effects approach is a proven dead end (audit report section 7).
  - key: "E"
    num: "V"
    title: "AWS / infra (optional, per-item go)"
    model: "Sonnet 5 · thinking on · high"
    note: >-
      Independent of C and D. Capture-side infrastructure to protect the
      benchmark's sample size and preserve irreplaceable race-day data at a
      few dollars a month. Plan-only today; each item needs its own go.

